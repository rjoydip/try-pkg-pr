name: CI

on:
  push:
    branches:
      - "**"
    tags:
      - "!**"
  pull_request:

permissions: {}

jobs:
  ci:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint
        run: bun run lint

      - name: Format check
        run: bun run format:check

      - name: Typecheck
        run: bun run typecheck

      - name: Test
        run: bun test

      - name: Build
        run: bun run build:all

  preview:
    name: Publish Preview (pkg.pr.new)
    runs-on: ubuntu-latest
    needs: ci
    # Only publish on pushes to branches (not tags, not forks)
    if: github.event_name == 'push' || github.event_name == 'pull_request'

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Build
        run: bun run build:all

      - id: publish
        name: Publish preview
        run: bun run publish:preview
